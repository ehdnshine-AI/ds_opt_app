upstream ds_opt_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream ds_opt_tomcat {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name __SERVER_NAME__;

    client_max_body_size 20m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    location = /healthz {
        proxy_pass http://ds_opt_api/healthz;
    }

    location = /readyz {
        proxy_pass http://ds_opt_api/readyz;
    }

    location = /docs {
        proxy_pass http://ds_opt_api/docs;
    }

    location = /openapi.json {
        proxy_pass http://ds_opt_api/openapi.json;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://ds_opt_api;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://ds_opt_tomcat;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
